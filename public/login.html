<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Ops Neural Grid — Secure Access</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000000;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      color: #00FF88;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }

    canvas {
      display: block;
    }

    .scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 10;
      background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0) 0px, rgba(0, 0, 0, 0) 1px, rgba(0, 255, 136, 0.03) 1px, rgba(0, 255, 136, 0.03) 2px);
      opacity: 0.6;
    }

    .crt-curve {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 11;
      background: radial-gradient(ellipse at center, transparent 0%, transparent 70%, rgba(0, 0, 0, 0.4) 100%);
    }

    .vignette {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 9;
      background: radial-gradient(ellipse at center, transparent 0%, transparent 40%, rgba(0, 0, 0, 0.8) 100%);
    }

    .warning-indicator {
      position: fixed;
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(255, 170, 0, 0.15);
      text-transform: uppercase;
      pointer-events: none;
      z-index: 12;
      animation: pulse 4s ease-in-out infinite;
    }

    .warning-tl {
      top: 20px;
      left: 20px;
    }

    .warning-tr {
      top: 20px;
      right: 20px;
    }

    .warning-bl {
      bottom: 20px;
      left: 20px;
    }

    .warning-br {
      bottom: 20px;
      right: 20px;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.1;
      }

      50% {
        opacity: 0.25;
      }
    }

    .login-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      width: 380px;
      padding: 40px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 255, 136, 0.2);
      border-radius: 4px;
      box-shadow: 0 0 60px rgba(0, 255, 136, 0.1), inset 0 0 60px rgba(0, 0, 0, 0.5);
    }

    .login-container::before {
      content: '';
      position: absolute;
      top: -1px;
      left: -1px;
      right: -1px;
      bottom: -1px;
      background: linear-gradient(135deg, rgba(0, 255, 136, 0.3) 0%, transparent 30%, transparent 70%, rgba(0, 212, 255, 0.3) 100%);
      border-radius: 4px;
      z-index: -1;
      opacity: 0.5;
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-header h1 {
      font-size: 14px;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: #00FF88;
      margin-bottom: 8px;
      font-weight: 400;
      text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
    }

    .login-header .subtitle {
      font-size: 9px;
      letter-spacing: 4px;
      color: rgba(0, 212, 255, 0.6);
      text-transform: uppercase;
    }

    .input-group {
      margin-bottom: 20px;
      position: relative;
    }

    .input-group label {
      display: block;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(0, 255, 136, 0.5);
      margin-bottom: 8px;
    }

    .input-group input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(0, 255, 136, 0.2);
      color: #00FF88;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 2px;
      outline: none;
      transition: all 0.3s ease;
    }

    .input-group input:focus {
      border-color: rgba(0, 255, 136, 0.6);
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.1), inset 0 0 20px rgba(0, 255, 136, 0.05);
    }

    .input-group input::placeholder {
      color: rgba(0, 255, 136, 0.2);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1px solid rgba(0, 255, 136, 0.4);
      color: #00FF88;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
      position: relative;
      overflow: hidden;
    }

    .login-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 136, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .login-btn:hover::before {
      left: 100%;
    }

    .login-btn:hover {
      background: rgba(0, 255, 136, 0.1);
      border-color: rgba(0, 255, 136, 0.8);
      box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 15px;
      font-size: 10px;
      color: rgba(0, 255, 136, 0.5);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .remember-me input[type="checkbox"] {
      width: auto;
      padding: 0;
      width: 16px;
      height: 16px;
      accent-color: #00FF88;
      cursor: pointer;
    }

    .remember-me label {
      cursor: pointer;
      margin: 0;
    }

    .password-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .password-input-wrapper input {
      padding-right: 45px;
    }

    .toggle-password {
      position: absolute;
      right: 10px;
      background: none;
      border: none;
      color: rgba(0, 255, 136, 0.5);
      cursor: pointer;
      font-size: 14px;
      padding: 5px;
      transition: color 0.2s;
    }

    .toggle-password:hover {
      color: rgba(0, 255, 136, 0.8);
    }

    .eye-icon {
      display: block;
    }

    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 15px 20px;
      border-radius: 4px;
      color: #fff;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      z-index: 100;
      animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
      max-width: 300px;
    }

    .notification.success {
      background: rgba(0, 255, 136, 0.2);
      border: 1px solid rgba(0, 255, 136, 0.5);
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
    }

    .notification.error {
      background: rgba(255, 68, 68, 0.2);
      border: 1px solid rgba(255, 68, 68, 0.5);
      box-shadow: 0 0 20px rgba(255, 68, 68, 0.2);
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes fadeOut {
      from {
        opacity: 1;
      }

      to {
        opacity: 0;
      }
    }

    .signup-prompt {
      text-align: center;
      margin-top: 18px;
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.2);
      text-transform: uppercase;
    }

    .signup-prompt a {
      color: rgba(0, 212, 255, 0.6);
      text-decoration: none;
      letter-spacing: 2px;
      transition: color 0.2s;
    }

    .signup-prompt a:hover {
      color: #00D4FF;
      text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
    }

    .signup-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      width: 380px;
      padding: 40px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 4px;
      box-shadow: 0 0 60px rgba(0, 212, 255, 0.08), inset 0 0 60px rgba(0, 0, 0, 0.5);
      display: none;
    }

    .signup-container::before {
      content: '';
      position: absolute;
      top: -1px;
      left: -1px;
      right: -1px;
      bottom: -1px;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.3) 0%, transparent 30%, transparent 70%, rgba(0, 255, 136, 0.3) 100%);
      border-radius: 4px;
      z-index: -1;
      opacity: 0.5;
    }

    .system-status {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(0, 212, 255, 0.4);
      text-transform: uppercase;
    }

    .cursor-blink {
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    .dof-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 8;
      box-shadow: inset 0 0 150px 60px rgba(0, 0, 0, 0.9);
    }

    @media (max-width: 480px) {

      .login-container,
      .signup-container {
        width: 90%;
        padding: 30px 20px;
      }

      .login-header h1 {
        font-size: 12px;
      }

      .warning-indicator {
        font-size: 8px;
      }
    }
  </style>
</head>

<body>
  <div id="canvas-container"></div>
  <div class="vignette"></div>
  <div class="dof-overlay"></div>
  <div class="scanlines"></div>
  <div class="crt-curve"></div>
  <div class="warning-indicator warning-tl">⚠ SECURE CONNECTION</div>
  <div class="warning-indicator warning-tr">ENCRYPTION: AES-256 ⚠</div>
  <div class="warning-indicator warning-bl">⚠ UNAUTHORIZED ACCESS PROHIBITED</div>
  <div class="warning-indicator warning-br">THREAT LEVEL: MINIMAL ⚠</div>
  <div class="login-container">
    <div class="login-header">
      <h1>DEEPTRACE</h1>
      <div class="subtitle">Autonomous Intelligence Network</div>
    </div>
    <div class="input-group">
      <label>Gmail</label>
      <input type="email" placeholder="agent@gmail.com" autocomplete="off">
    </div>
    <div class="input-group">
      <label>Password</label>
      <div class="password-input-wrapper">
        <input type="password" id="login-password" placeholder="••••••••••••">
        <button type="button" class="toggle-password" onclick="togglePassword('login-password', this)">
          <span class="eye-icon">👁</span>
        </button>
      </div>
    </div>
    <div class="remember-me">
      <input type="checkbox" id="remember-me">
      <label for="remember-me">Remember me</label>
    </div>
    <button class="login-btn" id="login-btn">INITIATE SESSION</button>
    <div class="signup-prompt">
      Need an account? <a href="#" onclick="showSignup()">Create one</a>
    </div>
  </div>

  <!-- Signup Modal -->
  <div class="signup-container" id="signupModal">
    <div class="login-header">
      <h1>DEEPTRACE</h1>
      <div class="subtitle">Register New Agent</div>
    </div>
    <div class="input-group">
      <label>Full Name</label>
      <input type="text" placeholder="AGENT NAME" autocomplete="off">
    </div>
    <div class="input-group">
      <label>Gmail</label>
      <input type="email" id="signup-email" placeholder="agent@gmail.com" autocomplete="off">
    </div>
    <div class="input-group">
      <label>Password</label>
      <div class="password-input-wrapper">
        <input type="password" id="signup-password" placeholder="••••••••••••">
        <button type="button" class="toggle-password" onclick="togglePassword('signup-password', this)">
          <span class="eye-icon">👁</span>
        </button>
      </div>
    </div>
    <button class="login-btn" id="create-btn">CREATE ACCOUNT</button>
    <div class="signup-prompt">
      Already enlisted? <a href="#" onclick="showLogin()">Sign in</a>
    </div>
  </div>
  <div class="system-status">
    SYSTEM ONLINE // AWAITING AUTHENTICATION<span class="cursor-blink">_</span>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000000, 0.02);
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 15, 25);
    camera.lookAt(0, 0, 0);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 1);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const NEON_GREEN = 0x00FF88;
    const ELECTRIC_CYAN = 0x00D4FF;

    const centralGlowGeometry = new THREE.SphereGeometry(2, 32, 32);
    const centralGlowMaterial = new THREE.MeshBasicMaterial({ color: NEON_GREEN, transparent: true, opacity: 0.15, blending: THREE.AdditiveBlending });
    const centralGlow = new THREE.Mesh(centralGlowGeometry, centralGlowMaterial);
    scene.add(centralGlow);

    const innerGlowGeometry = new THREE.SphereGeometry(0.8, 32, 32);
    const innerGlowMaterial = new THREE.MeshBasicMaterial({ color: NEON_GREEN, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
    const innerGlow = new THREE.Mesh(innerGlowGeometry, innerGlowMaterial);
    scene.add(innerGlow);

    const centerLight = new THREE.PointLight(NEON_GREEN, 2, 50);
    scene.add(centerLight);
    const centerLightCyan = new THREE.PointLight(ELECTRIC_CYAN, 1, 40);
    centerLightCyan.position.set(0, 2, 0);
    scene.add(centerLightCyan);

    const gridLayers = [];
    for (let layer = 0; layer < 5; layer++) {
      const layerGroup = new THREE.Group();
      const hexRadius = 1.5;
      const gridSize = 7 - layer;
      const yOffset = (layer - 2) * 3;
      const scale = 1 + layer * 0.3;
      for (let q = -gridSize; q <= gridSize; q++) {
        for (let r = -gridSize; r <= gridSize; r++) {
          if (Math.abs(q + r) > gridSize) continue;
          const x = hexRadius * 1.5 * q;
          const z = hexRadius * Math.sqrt(3) * (r + q / 2);
          const hexGeo = new THREE.RingGeometry(hexRadius * 0.85, hexRadius, 6);
          const hexMat = new THREE.MeshBasicMaterial({ color: layer % 2 === 0 ? NEON_GREEN : ELECTRIC_CYAN, transparent: true, opacity: 0.15 - layer * 0.02, side: THREE.DoubleSide, blending: THREE.AdditiveBlending });
          const hex = new THREE.Mesh(hexGeo, hexMat);
          hex.rotation.x = -Math.PI / 2;
          hex.position.set(x * scale, yOffset, z * scale);
          layerGroup.add(hex);
          if (Math.random() > 0.6) {
            const nodeGeo = new THREE.SphereGeometry(0.08, 8, 8);
            const nodeMat = new THREE.MeshBasicMaterial({ color: layer % 2 === 0 ? NEON_GREEN : ELECTRIC_CYAN, transparent: true, opacity: 0.8 - layer * 0.1, blending: THREE.AdditiveBlending });
            const node = new THREE.Mesh(nodeGeo, nodeMat);
            node.position.set(x * scale, yOffset + 0.1, z * scale);
            layerGroup.add(node);
          }
        }
      }
      layerGroup.userData = { originalY: yOffset, layer, speed: 0.2 + layer * 0.1 };
      gridLayers.push(layerGroup);
      scene.add(layerGroup);
    }

    const dataStreams = [];
    for (let i = 0; i < 40; i++) {
      const points = [];
      const startX = (Math.random() - 0.5) * 30;
      const startZ = (Math.random() - 0.5) * 30;
      const startY = (Math.random() - 0.5) * 10;
      for (let j = 0; j < 5; j++) {
        points.push(new THREE.Vector3(startX + (Math.random() - 0.5) * 5, startY + j * 2, startZ + (Math.random() - 0.5) * 5));
      }
      const curve = new THREE.CatmullRomCurve3(points);
      const tubeGeo = new THREE.TubeGeometry(curve, 20, 0.02, 4, false);
      const tubeMat = new THREE.MeshBasicMaterial({ color: Math.random() > 0.5 ? NEON_GREEN : ELECTRIC_CYAN, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending });
      const tube = new THREE.Mesh(tubeGeo, tubeMat);
      tube.userData = { originalOpacity: 0.3, pulseSpeed: 0.5 + Math.random() * 1.5, offset: Math.random() * Math.PI * 2 };
      dataStreams.push(tube);
      scene.add(tube);
    }

    const planes = [];
    for (let i = 0; i < 8; i++) {
      const planeGeo = new THREE.PlaneGeometry(40 + i * 10, 40 + i * 10);
      const planeMat = new THREE.MeshBasicMaterial({ color: i % 2 === 0 ? NEON_GREEN : ELECTRIC_CYAN, transparent: true, opacity: 0.02 - i * 0.002, side: THREE.DoubleSide, blending: THREE.AdditiveBlending, wireframe: true });
      const plane = new THREE.Mesh(planeGeo, planeMat);
      plane.rotation.x = -Math.PI / 2;
      plane.position.y = -5 - i * 4;
      plane.userData = { speed: 0.05 + i * 0.01 };
      planes.push(plane);
      scene.add(plane);
    }

    const particleCount = 800;
    const particleGeo = new THREE.BufferGeometry();
    const particlePositions = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount; i++) {
      particlePositions[i * 3] = (Math.random() - 0.5) * 60;
      particlePositions[i * 3 + 1] = (Math.random() - 0.5) * 30;
      particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 60;
    }
    particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
    const particleMat = new THREE.PointsMaterial({ color: NEON_GREEN, size: 0.05, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
    const particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);

    const godRays = [];
    for (let i = 0; i < 6; i++) {
      const rayGeo = new THREE.ConeGeometry(0.5, 20, 4, 1, true);
      const rayMat = new THREE.MeshBasicMaterial({ color: NEON_GREEN, transparent: true, opacity: 0.03, blending: THREE.AdditiveBlending, side: THREE.DoubleSide, depthWrite: false });
      const ray = new THREE.Mesh(rayGeo, rayMat);
      ray.position.set(0, 10, 0);
      ray.rotation.z = Math.PI;
      ray.rotation.y = (Math.PI / 3) * i;
      ray.userData = { rotationSpeed: 0.002 + i * 0.001 };
      godRays.push(ray);
      scene.add(ray);
    }

    let mouseX = 0, mouseY = 0, targetX = 0, targetY = 0;
    document.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX / window.innerWidth) * 2 - 1;
      mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const time = clock.getElapsedTime();
      targetX += (mouseX * 2 - targetX) * 0.02;
      targetY += (mouseY * 1 - targetY) * 0.02;
      camera.position.x = targetX * 3;
      camera.position.y = 15 + targetY * 2;
      camera.lookAt(0, 0, 0);
      const breathe = 1 + Math.sin(time * 0.8) * 0.1;
      centralGlow.scale.set(breathe, breathe, breathe);
      centralGlowMaterial.opacity = 0.12 + Math.sin(time * 1.2) * 0.03;
      innerGlowMaterial.opacity = 0.35 + Math.sin(time * 1.5) * 0.08;
      centerLight.intensity = 1.8 + Math.sin(time * 0.8) * 0.4;
      gridLayers.forEach((layer, index) => {
        layer.position.y = layer.userData.originalY + Math.sin(time * layer.userData.speed + index) * 0.5;
        layer.rotation.y = Math.sin(time * 0.1 + index * 0.5) * 0.05;
      });
      dataStreams.forEach(stream => {
        const pulse = Math.sin(time * stream.userData.pulseSpeed + stream.userData.offset);
        stream.material.opacity = stream.userData.originalOpacity + pulse * 0.15;
      });
      planes.forEach((plane, index) => {
        plane.rotation.z += plane.userData.speed * 0.1;
        plane.material.opacity = (0.02 - index * 0.002) + Math.sin(time * 0.5 + index) * 0.005;
      });
      const positions = particles.geometry.attributes.position.array;
      for (let i = 0; i < particleCount; i++) {
        positions[i * 3 + 1] += Math.sin(time * 0.5 + i) * 0.01;
        if (positions[i * 3 + 1] > 15) positions[i * 3 + 1] = -15;
      }
      particles.geometry.attributes.position.needsUpdate = true;
      particles.rotation.y = time * 0.02;
      godRays.forEach((ray, index) => {
        ray.rotation.y += ray.userData.rotationSpeed;
        ray.material.opacity = 0.02 + Math.sin(time * 0.3 + index) * 0.01;
      });
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function showSignup() {
      document.querySelector('.login-container').style.display = 'none';
      document.getElementById('signupModal').style.display = 'block';
    }
    function showLogin() {
      document.getElementById('signupModal').style.display = 'none';
      document.querySelector('.login-container').style.display = 'block';
    }

    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('focus', () => { centerLight.intensity = 4; centerLight.color.setHex(ELECTRIC_CYAN); });
      input.addEventListener('blur', () => { centerLight.intensity = 2; centerLight.color.setHex(NEON_GREEN); });
    });

    // Form validation and error handling
    function validateEmail(email) {
      const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return re.test(email);
    }

    function showError(input, message) {
      const inputGroup = input.closest('.input-group');
      input.style.borderColor = '#ff4444';
      const errorDiv = document.createElement('div');
      errorDiv.className = 'error-message';
      errorDiv.style.color = '#ff4444';
      errorDiv.style.fontSize = '10px';
      errorDiv.style.marginTop = '5px';
      errorDiv.textContent = message;

      // Remove existing error if any
      const existingError = inputGroup.querySelector('.error-message');
      if (existingError) existingError.remove();

      inputGroup.appendChild(errorDiv);
    }

    function clearError(input) {
      const inputGroup = input.closest('.input-group');
      input.style.borderColor = 'rgba(0,255,136,0.2)';
      const existingError = inputGroup.querySelector('.error-message');
      if (existingError) existingError.remove();
    }

    // Auth handlers with validation
    document.getElementById('login-btn').addEventListener('click', function () {
      const emailInput = document.querySelector('.login-container input[type="email"]');
      const passwordInput = document.querySelector('.login-container input[type="password"]');
      const rememberMeCheckbox = document.getElementById('remember-me');
      const email = emailInput.value;
      const password = passwordInput.value;
      const btn = this;

      // Clear previous errors
      clearError(emailInput);
      clearError(passwordInput);

      // Validate email
      if (!email) {
        showError(emailInput, 'Email is required');
        return;
      }
      if (!validateEmail(email)) {
        showError(emailInput, 'Please enter a valid email address');
        return;
      }

      // Validate password
      if (!password) {
        showError(passwordInput, 'Password is required');
        return;
      }
      if (password.length < 6) {
        showError(passwordInput, 'Password must be at least 6 characters');
        return;
      }

      // Show loading state
      btn.textContent = 'AUTHENTICATING...';
      btn.disabled = true;
      btn.style.opacity = '0.7';

      // Simulate loading delay
      setTimeout(() => {
        // Success - save session and redirect to chat_ui
        localStorage.setItem('dt_session', 'true');
        localStorage.setItem('dt_user', email);

        // Remember me functionality
        if (rememberMeCheckbox.checked) {
          localStorage.setItem('dt_remember', 'true');
          localStorage.setItem('dt_saved_email', email);
        } else {
          localStorage.removeItem('dt_remember');
          localStorage.removeItem('dt_saved_email');
        }

        showNotification('Authentication successful. Redirecting...', 'success');

        setTimeout(() => {
          window.location.href = '/chat_ui';
        }, 500);
      }, 1000);
    });

    document.getElementById('create-btn').addEventListener('click', function () {
      const nameInput = document.querySelector('#signupModal input[type="text"]');
      const emailInput = document.getElementById('signup-email');
      const passwordInput = document.querySelector('#signupModal input[type="password"]');
      const name = nameInput.value;
      const email = emailInput.value;
      const password = passwordInput.value;
      const btn = this;

      // Clear previous errors
      clearError(nameInput);
      clearError(emailInput);
      clearError(passwordInput);

      // Validate name
      if (!name) {
        showError(nameInput, 'Name is required');
        return;
      }

      // Validate email
      if (!email) {
        showError(emailInput, 'Email is required');
        return;
      }
      if (!validateEmail(email)) {
        showError(emailInput, 'Please enter a valid email address');
        return;
      }

      // Validate password
      if (!password) {
        showError(passwordInput, 'Password is required');
        return;
      }
      if (password.length < 6) {
        showError(passwordInput, 'Password must be at least 6 characters');
        return;
      }

      // Show loading state
      btn.textContent = 'CREATING ACCOUNT...';
      btn.disabled = true;
      btn.style.opacity = '0.7';

      // Simulate loading delay
      setTimeout(() => {
        // Success - save session and redirect to chat_ui
        localStorage.setItem('dt_session', 'true');
        localStorage.setItem('dt_user', email);

        showNotification('Account created successfully. Redirecting...', 'success');

        setTimeout(() => {
          window.location.href = '/chat_ui';
        }, 500);
      }, 1000);
    });

    // Clear errors on input
    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('input', () => clearError(input));
    });

    // Auto-fill email if remember me was checked
    const rememberMe = localStorage.getItem('dt_remember');
    const savedEmail = localStorage.getItem('dt_saved_email');
    if (rememberMe === 'true' && savedEmail) {
      const emailInput = document.querySelector('.login-container input[type="email"]');
      const rememberMeCheckbox = document.getElementById('remember-me');
      emailInput.value = savedEmail;
      rememberMeCheckbox.checked = true;
    }

    // Password visibility toggle function
    function togglePassword(inputId, button) {
      const input = document.getElementById(inputId);
      const eyeIcon = button.querySelector('.eye-icon');

      if (input.type === 'password') {
        input.type = 'text';
        eyeIcon.textContent = '🙈';
      } else {
        input.type = 'password';
        eyeIcon.textContent = '👁';
      }
    }

    // Notification function
    function showNotification(message, type = 'success') {
      const notification = document.createElement('div');
      notification.className = `notification ${type}`;
      notification.textContent = message;
      document.body.appendChild(notification);

      // Remove notification after animation
      setTimeout(() => {
        notification.remove();
      }, 3000);
    }

    // Keyboard support - Enter key to submit
    document.querySelectorAll('.login-container input').forEach(input => {
      input.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
          document.getElementById('login-btn').click();
        }
      });
    });

    document.querySelectorAll('#signupModal input').forEach(input => {
      input.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
          document.getElementById('create-btn').click();
        }
      });
    });
  </script>
</body>

</html>
